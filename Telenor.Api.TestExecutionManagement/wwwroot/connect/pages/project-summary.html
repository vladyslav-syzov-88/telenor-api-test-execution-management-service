<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Test Summary</title>
	<link rel="stylesheet" href="/connect/assets/styles.css" />
	<script src="https://connect-cdn.atl-paas.net/all.js" data-options="sizeToParent:true"></script>
	<script src="/connect/js/connect-client.js"></script>
</head>
<body>
	<h1>Test Summary</h1>
	<div id="content"></div>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			TCM.init(function (context) {
				const projectId = TCM.getQueryParam('projectId') || context.jira?.project?.id;
				if (projectId) {
					loadSummary(projectId);
				} else {
					document.getElementById('content').innerHTML =
						'<div class="tcm-empty"><p>No project context available.</p></div>';
				}
			});
		});

		async function loadSummary(projectId) {
			const container = document.getElementById('content');
			TCM.showLoading(container);

			try {
				const versions = await TCM.api('/api/dashboard/versions?projectId=' + projectId);

				if (versions.length === 0) {
					container.innerHTML = '<div class="tcm-empty"><p>No versions with test data found.</p></div>';
					return;
				}

				let html = '<table class="tcm-table"><thead><tr>';
				html += '<th>Version</th><th>Status</th><th>Release Date</th>';
				html += '</tr></thead><tbody>';

				versions.forEach(function (v) {
					const status = v.isReleased
						? '<span class="tcm-badge" style="background:#36B37E">Released</span>'
						: '<span class="tcm-badge" style="background:#FFAB00">Unreleased</span>';
					html += '<tr>';
					html += '<td><strong>' + escapeHtml(v.versionName) + '</strong></td>';
					html += '<td>' + status + '</td>';
					html += '<td>' + (v.releaseDate ? formatDate(v.releaseDate) : '-') + '</td>';
					html += '</tr>';
				});

				html += '</tbody></table>';
				container.innerHTML = html;
			} catch (err) {
				container.innerHTML = '<div class="tcm-empty"><p>Failed to load project summary.</p></div>';
				console.error(err);
			}
		}

		function formatDate(d) {
			if (!d) return '-';
			return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
		}

		function escapeHtml(str) {
			if (!str) return '';
			const div = document.createElement('div');
			div.textContent = str;
			return div.innerHTML;
		}
	</script>
</body>
</html>
